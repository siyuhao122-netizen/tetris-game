<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>俄罗斯方块</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #fff;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden;
  }
  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 8px;
    max-width: 100vw;
  }
  .game-container {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    justify-content: center;
  }
  .board-wrap {
    position: relative;
    background: #111;
    border: 2px solid #333;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(80,120,255,0.15);
  }
  canvas#board {
    display: block;
    width: 100%;
    height: auto;
  }
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 90px;
  }
  .info-box {
    background: #111;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 10px;
    text-align: center;
  }
  .info-box .label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .info-box .value {
    font-size: 22px;
    font-weight: bold;
    color: #4af;
    font-variant-numeric: tabular-nums;
  }
  #nextCanvas {
    display: block;
    margin: 0 auto;
    width: 72px;
    height: 72px;
  }
  .status-msg {
    text-align: center;
    font-size: 13px;
    color: #f90;
    font-weight: 600;
    min-height: 20px;
    margin-top: 2px;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 4px;
    width: 100%;
    max-width: 380px;
  }
  .ctrl-btn {
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 10px;
    color: #fff;
    font-size: 22px;
    padding: 12px 20px;
    touch-action: manipulation;
    cursor: pointer;
    min-width: 52px;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }
  .ctrl-btn:active { background: #2a2a4e; }
  .ctrl-btn.wide { min-width: 80px; }
  .ctrl-btn.special { background: #2a1a3e; border-color: #64f; }
  .ctrl-btn.special:active { background: #3a2a5e; }
  .ctrl-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    width: 100%;
  }

  @media (max-width: 480px) {
    .game-wrapper { gap: 4px; padding: 4px; }
    .game-container { gap: 8px; }
    .side-panel { min-width: 75px; }
    .info-box { padding: 6px; }
    .info-box .value { font-size: 18px; }
    #nextCanvas { width: 56px; height: 56px; }
    .ctrl-btn { font-size: 18px; padding: 10px 14px; min-width: 44px; }
    .ctrl-btn.wide { min-width: 64px; }
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="game-container">
    <div class="board-wrap">
      <canvas id="board" width="200" height="400"></canvas>
    </div>
    <div class="side-panel">
      <div class="info-box">
        <div class="label">分数</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="info-box">
        <div class="label">等级</div>
        <div class="value" id="level">1</div>
      </div>
      <div class="info-box">
        <div class="label">行数</div>
        <div class="value" id="lines">0</div>
      </div>
      <div class="info-box">
        <div class="label">下一个</div>
        <canvas id="nextCanvas" width="80" height="80"></canvas>
      </div>
    </div>
  </div>
  <div class="status-msg" id="statusMsg">&nbsp;</div>
  <div class="controls">
    <div class="ctrl-row">
      <button class="ctrl-btn" id="btnLeft">◀</button>
      <button class="ctrl-btn" id="btnRotate">↻</button>
      <button class="ctrl-btn" id="btnRight">▶</button>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn wide" id="btnDown">▼ 下落</button>
      <button class="ctrl-btn wide special" id="btnDrop">⬇ 硬降</button>
    </div>
    <div style="width:100%;margin-top:2px;">
      <button class="ctrl-btn wide" id="btnRestart" style="background:#1a2a1e;border-color:#484;width:100%;">🔄 重新开始</button>
    </div>
  </div>
</div>
<script>
// ======== TETRIS ========
const COLS = 10, ROWS = 20;
const BLOCK_SIZE = 20;   // board cell px
const PREVIEW_SIZE = 16; // preview cell px

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nextCtx = nextCanvas.getContext('2d');

const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const linesEl = document.getElementById('lines');
const statusEl = document.getElementById('statusMsg');

// Tetromino shapes
const SHAPES = [
  // I
  [[1,1,1,1]],
  // O
  [[1,1],[1,1]],
  // T
  [[0,1,0],[1,1,1]],
  // S
  [[0,1,1],[1,1,0]],
  // Z
  [[1,1,0],[0,1,1]],
  // J
  [[1,0,0],[1,1,1]],
  // L
  [[0,0,1],[1,1,1]]
];

const COLORS = [
  '#0ff', '#ff0', '#a0f', '#0f0', '#f00', '#00f', '#f80'
];

let board = [];
let currentPiece = null; // { shape, x, y, type }
let nextPiece = null;
let score = 0;
let lines = 0;
let level = 1;
let gameOver = false;
let paused = false;
let dropInterval = null;
let animFrame = null;

// Touch state
let touchStartX = 0, touchStartY = 0;
let touchStartTime = 0;

function initBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board.push(new Array(COLS).fill(0));
  }
}

function randomPiece() {
  const type = Math.floor(Math.random() * SHAPES.length);
  return {
    shape: SHAPES[type].map(row => [...row]),
    type
  };
}

function spawnPiece() {
  if (!nextPiece) nextPiece = randomPiece();
  currentPiece = {
    shape: nextPiece.shape.map(row => [...row]),
    x: Math.floor((COLS - nextPiece.shape[0].length) / 2),
    y: 0,
    type: nextPiece.type
  };
  nextPiece = randomPiece();
  if (!canPlace(currentPiece.shape, currentPiece.x, currentPiece.y)) {
    gameOver = true;
    statusEl.textContent = '💀 游戏结束！点"重新开始"';
    clearInterval(dropInterval);
    dropInterval = null;
  }
  drawAll();
}

function canPlace(shape, px, py) {
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (!shape[r][c]) continue;
      const bx = px + c, by = py + r;
      if (bx < 0 || bx >= COLS || by >= ROWS) return false;
      if (by < 0) continue;
      if (board[by][bx]) return false;
    }
  }
  return true;
}

function lockPiece() {
  if (!currentPiece) return;
  const { shape, x, y, type } = currentPiece;
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (!shape[r][c]) continue;
      const by = y + r;
      if (by >= 0) board[by][x + c] = type + 1;
    }
  }
  clearLines();
  spawnPiece();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c !== 0)) {
      board.splice(r, 1);
      board.unshift(new Array(COLS).fill(0));
      cleared++;
      r++; // re-check same row
    }
  }
  if (cleared > 0) {
    const points = [0, 100, 300, 500, 800];
    score += points[Math.min(cleared,4)];
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    updateUI();
    resetDropTimer();
  }
}

function moveLeft() {
  if (!currentPiece || gameOver) return;
  if (canPlace(currentPiece.shape, currentPiece.x - 1, currentPiece.y)) {
    currentPiece.x--;
    drawAll();
  }
}

function moveRight() {
  if (!currentPiece || gameOver) return;
  if (canPlace(currentPiece.shape, currentPiece.x + 1, currentPiece.y)) {
    currentPiece.x++;
    drawAll();
  }
}

function rotatePiece() {
  if (!currentPiece || gameOver) return;
  const shape = currentPiece.shape;
  const rotated = shape[0].map((_, i) => shape.map(row => row[i]).reverse());
  // Wall kick: try left, right, up
  const kicks = [0, -1, 1, -2, 2];
  for (const kick of kicks) {
    if (canPlace(rotated, currentPiece.x + kick, currentPiece.y)) {
      currentPiece.shape = rotated;
      currentPiece.x += kick;
      drawAll();
      return;
    }
  }
}

function moveDown() {
  if (!currentPiece || gameOver) return;
  if (canPlace(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
    currentPiece.y++;
    drawAll();
    return true;
  } else {
    lockPiece();
    drawAll();
    return false;
  }
}

function hardDrop() {
  if (!currentPiece || gameOver) return;
  while (canPlace(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
    currentPiece.y++;
    score += 2;
  }
  lockPiece();
  updateUI();
  drawAll();
}

function getDropSpeed() {
  return Math.max(80, 800 - (level - 1) * 70);
}

function resetDropTimer() {
  if (dropInterval) clearInterval(dropInterval);
  if (!gameOver) {
    dropInterval = setInterval(() => moveDown(), getDropSpeed());
  }
}

function updateUI() {
  scoreEl.textContent = score;
  levelEl.textContent = level;
  linesEl.textContent = lines;
}

// Draw
function drawBlock(context, x, y, color, size) {
  context.fillStyle = color;
  context.fillRect(x * size + 1, y * size + 1, size - 2, size - 2);
  // Highlight
  context.fillStyle = 'rgba(255,255,255,0.15)';
  context.fillRect(x * size + 1, y * size + 1, size - 6, 2);
  context.fillRect(x * size + 1, y * size + 1, 2, size - 6);
  // Shadow
  context.fillStyle = 'rgba(0,0,0,0.25)';
  context.fillRect(x * size + size - 3, y * size + 1, 2, size - 2);
  context.fillRect(x * size + 1, y * size + size - 3, size - 2, 2);
}

function drawBoard() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Grid
  ctx.strokeStyle = '#1a1a2e';
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * BLOCK_SIZE);
    ctx.lineTo(canvas.width, r * BLOCK_SIZE);
    ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(c * BLOCK_SIZE, 0);
    ctx.lineTo(c * BLOCK_SIZE, canvas.height);
    ctx.stroke();
  }
  // Placed blocks
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) {
        drawBlock(ctx, c, r, COLORS[board[r][c] - 1], BLOCK_SIZE);
      }
    }
  }
  // Ghost piece
  if (currentPiece && !gameOver) {
    let ghostY = currentPiece.y;
    while (canPlace(currentPiece.shape, currentPiece.x, ghostY + 1)) ghostY++;
    const { shape, x, type } = currentPiece;
    for (let r = 0; r < shape.length; r++) {
      for (let c = 0; c < shape[r].length; c++) {
        if (!shape[r][c]) continue;
        const by = ghostY + r;
        if (by < 0) continue;
        ctx.fillStyle = 'rgba(255,255,255,0.07)';
        ctx.fillRect((x + c) * BLOCK_SIZE + 1, by * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.strokeRect((x + c) * BLOCK_SIZE + 1, by * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
      }
    }
  }
  // Current piece
  if (currentPiece && !gameOver) {
    const { shape, x, y, type } = currentPiece;
    for (let r = 0; r < shape.length; r++) {
      for (let c = 0; c < shape[r].length; c++) {
        if (!shape[r][c]) continue;
        const by = y + r;
        if (by < 0) continue;
        drawBlock(ctx, x + c, by, COLORS[type], BLOCK_SIZE);
      }
    }
  }
}

function drawPreview() {
  nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  if (!nextPiece) return;
  const shape = nextPiece.shape;
  const rows = shape.length, cols = shape[0].length;
  const offsetX = (nextCanvas.width - cols * PREVIEW_SIZE) / 2;
  const offsetY = (nextCanvas.height - rows * PREVIEW_SIZE) / 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (!shape[r][c]) continue;
      nextCtx.fillStyle = COLORS[nextPiece.type];
      nextCtx.fillRect(offsetX + c * PREVIEW_SIZE + 1, offsetY + r * PREVIEW_SIZE + 1, PREVIEW_SIZE - 2, PREVIEW_SIZE - 2);
    }
  }
}

function drawAll() {
  drawBoard();
  drawPreview();
}

// Key controls
document.addEventListener('keydown', (e) => {
  if (gameOver && e.key !== 'r' && e.key !== 'R') return;
  switch (e.key) {
    case 'ArrowLeft': e.preventDefault(); moveLeft(); break;
    case 'ArrowRight': e.preventDefault(); moveRight(); break;
    case 'ArrowUp': e.preventDefault(); rotatePiece(); break;
    case 'ArrowDown': e.preventDefault(); moveDown(); break;
    case ' ': e.preventDefault(); hardDrop(); break;
    case 'r': case 'R': restartGame(); break;
  }
});

// Touch controls on board
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameOver) return;
  const t = e.changedTouches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchStartTime = Date.now();
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (gameOver) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const elapsed = Date.now() - touchStartTime;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (elapsed < 150 && absDx < 10 && absDy < 10) {
    // Tap = rotate
    rotatePiece();
  } else if (absDx > absDy && absDx > 20) {
    if (dx > 0) moveRight(); else moveLeft();
  } else if (absDy > absDx && absDy > 20) {
    if (dy > 0) hardDrop(); else rotatePiece();
  }
}, { passive: false });

// Button controls
document.getElementById('btnLeft').addEventListener('click', moveLeft);
document.getElementById('btnRight').addEventListener('click', moveRight);
document.getElementById('btnRotate').addEventListener('click', rotatePiece);
document.getElementById('btnDown').addEventListener('click', moveDown);
document.getElementById('btnDrop').addEventListener('click', hardDrop);
document.getElementById('btnRestart').addEventListener('click', restartGame);

// Prevent scrolling on buttons (mobile)
document.querySelectorAll('.ctrl-btn').forEach(btn => {
  btn.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
});

function restartGame() {
  if (dropInterval) clearInterval(dropInterval);
  initBoard();
  score = 0;
  lines = 0;
  level = 1;
  gameOver = false;
  nextPiece = null;
  statusEl.textContent = '🎮 游戏开始！';
  updateUI();
  spawnPiece();
  resetDropTimer();
  drawAll();
}

// Start
initBoard();
spawnPiece();
resetDropTimer();
drawAll();
</script>
</body>
</html>
